<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>北京环球影城魔法攻略 🪄</title>
    <style>
      :root {
        --ink: #4b3924;
        --muted: #7d6a4f;
        --line: #c8ad78;
        --paper: #f7edd6;
        --panel: #fff7e6;
        --blue: #276a82;
        --red: #a84232;
        --amber: #ad7a24;
        --green: #5b7c3f;
        --violet: #6b4f89;
        --teal: #2f7280;
        --shadow: 0 18px 45px rgba(83, 60, 28, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow-x: hidden;
        color: var(--ink);
        background: #f5eddf;
        font-family:
          "Songti SC", "STSong", "Kaiti SC", Georgia, "Times New Roman", "PingFang SC",
          "Microsoft YaHei", serif;
      }

      button {
        font: inherit;
      }

      .app {
        width: min(1180px, 100%);
        min-height: 100vh;
        display: grid;
        grid-template-columns: 1fr;
        gap: 18px;
        margin: 0 auto;
        padding: 18px;
      }

      .map-shell,
      .side {
        position: relative;
      }

      .map-shell {
        display: flex;
        flex-direction: column;
        min-width: 0;
        overflow: hidden;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 16px 20px 14px;
      }

      .title h1 {
        margin: 0;
        color: #4b3924;
        font-size: 26px;
        line-height: 1.2;
        letter-spacing: 0;
      }

      .title p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .route-toggle {
        display: inline-grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
        padding: 5px;
      }

      .route-toggle button,
      .chip-row button,
      .timeline button {
        border: 0;
        cursor: pointer;
      }

      .route-toggle button {
        min-width: 112px;
        border-radius: 999px;
        padding: 9px 14px;
        color: var(--muted);
        background: transparent;
        font-weight: 800;
      }

      .route-toggle button.active[data-route="planA"] {
        color: #ffffff;
        background: linear-gradient(180deg, #b6533f, var(--red));
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.28);
      }

      .route-toggle button.active[data-route="planB"] {
        color: #ffffff;
        background: linear-gradient(180deg, #3d7f96, var(--blue));
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.28);
      }

      .map-scroll {
        flex: 1;
        overflow: auto;
        max-height: 540px;
        padding: 20px;
        background: transparent;
      }

      .park-map {
        position: relative;
        width: min(760px, 100%);
        min-width: 520px;
        aspect-ratio: 1086 / 1448;
        margin: 0 auto;
        overflow: hidden;
        border: 2px solid #9bbf77;
        border-radius: 8px;
        background: #72bf69;
        box-shadow:
          0 0 0 6px rgba(255, 247, 225, 0.82),
          0 0 0 8px rgba(133, 91, 42, 0.34),
          inset 0 0 80px rgba(56, 93, 43, 0.14);
      }

      .map-image {
        position: absolute;
        inset: 0;
        z-index: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none;
      }

      .path {
        position: absolute;
        z-index: 1;
        border-radius: 999px;
        background: #d8d5c9;
        border: 2px solid rgba(126, 118, 97, 0.34);
        box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.45);
      }

      .path.main {
        left: 8%;
        top: 54%;
        width: 76%;
        height: 9%;
        transform: rotate(-14deg);
      }

      .path.loop {
        left: 30%;
        top: 27%;
        width: 49%;
        height: 8%;
        transform: rotate(10deg);
      }

      .path.right {
        left: 66%;
        top: 22%;
        width: 8%;
        height: 41%;
        transform: rotate(25deg);
      }

      .path.left {
        left: 18%;
        top: 16%;
        width: 8%;
        height: 54%;
        transform: rotate(-26deg);
      }

      .path.bridge {
        left: 34%;
        top: 70%;
        width: 25%;
        height: 7%;
        transform: rotate(33deg);
      }

      .tree {
        position: absolute;
        z-index: 1;
        width: 34px;
        height: 34px;
        border-radius: 55% 45% 50% 50%;
        background: radial-gradient(circle at 35% 30%, #6eb54b, #2f7a3d 72%);
        box-shadow:
          18px 8px 0 -4px #397f3e,
          -14px 12px 0 -7px #4f9a43,
          8px -13px 0 -9px #83c763;
        opacity: 0.8;
      }

      .zone {
        position: absolute;
        z-index: 2;
        display: grid;
        place-items: center;
        padding: 8px;
        border: 3px solid rgba(71, 85, 105, 0.28);
        border-radius: 28% 18% 24% 18%;
        color: #ffffff;
        font-size: 28px;
        font-weight: 900;
        text-align: center;
        text-shadow:
          0 3px 0 rgba(40, 47, 35, 0.88),
          2px 0 0 rgba(40, 47, 35, 0.78),
          -2px 0 0 rgba(40, 47, 35, 0.78),
          0 8px 16px rgba(20, 43, 18, 0.38);
        box-shadow:
          inset 0 18px 30px rgba(255, 255, 255, 0.25),
          inset 0 -18px 34px rgba(37, 55, 31, 0.24),
          0 14px 20px rgba(37, 67, 35, 0.22);
      }

      .zone small {
        display: block;
        margin-top: 2px;
        font-size: 12px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.9);
      }

      .hollywood {
        left: 12%;
        top: 64%;
        width: 22%;
        height: 18%;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.24), transparent),
          #bd8b45;
        border-radius: 20% 28% 18% 24%;
      }

      .minion {
        left: 53%;
        top: 69%;
        width: 18%;
        height: 18%;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.32), transparent),
          #e7b93d;
        border-radius: 22% 18% 28% 22%;
      }

      .harry {
        left: 76%;
        top: 33%;
        width: 20%;
        height: 21%;
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.28), transparent 45%),
          #697080;
        clip-path: polygon(15% 18%, 31% 4%, 43% 16%, 58% 2%, 69% 17%, 88% 18%, 95% 84%, 5% 86%);
      }

      .transformers {
        left: 10%;
        top: 16%;
        width: 26%;
        height: 25%;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.2), transparent),
          #4e5f67;
        border-radius: 12% 18% 22% 15%;
      }

      .kungfu {
        left: 47%;
        top: 14%;
        width: 25%;
        height: 17%;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.28), transparent),
          #d28e45;
        border-radius: 24% 30% 22% 18%;
      }

      .jurassic {
        left: 35%;
        top: 43%;
        width: 27%;
        height: 24%;
        background:
          radial-gradient(circle at 42% 22%, #b36f2f 0 16%, transparent 17%),
          linear-gradient(135deg, rgba(255, 255, 255, 0.22), transparent),
          #7da45a;
        border-radius: 46% 32% 40% 30%;
      }

      .waterworld {
        left: 73%;
        top: 9%;
        width: 17%;
        height: 18%;
        background:
          radial-gradient(circle at 55% 36%, #3db7d6 0 22%, transparent 24%),
          linear-gradient(135deg, rgba(255, 255, 255, 0.25), transparent),
          #9b6f47;
        border-radius: 45% 45% 24% 28%;
      }

      .lagoon {
        position: absolute;
        z-index: 1;
        left: 28%;
        top: 57%;
        width: 26%;
        height: 18%;
        border-radius: 58% 42% 48% 52%;
        background:
          radial-gradient(circle at 35% 25%, rgba(255, 255, 255, 0.38), transparent 18%),
          #169fd4;
        border: 4px solid rgba(32, 100, 122, 0.3);
        box-shadow: inset 0 -16px 30px rgba(21, 87, 126, 0.28);
      }

      .entrance {
        position: absolute;
        z-index: 2;
        left: 4%;
        bottom: 10%;
        width: 17%;
        padding: 8px;
        border-radius: 8px;
        color: #fff7ed;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.2), transparent),
          #b6572d;
        text-align: center;
        font-size: 28px;
        font-weight: 900;
        text-shadow:
          0 3px 0 rgba(52, 31, 23, 0.84),
          2px 0 0 rgba(52, 31, 23, 0.74),
          -2px 0 0 rgba(52, 31, 23, 0.74);
        box-shadow:
          inset 0 18px 30px rgba(255, 255, 255, 0.25),
          0 14px 20px rgba(37, 67, 35, 0.22);
      }

      .route-layer {
        position: absolute;
        inset: 0;
        z-index: 3;
        pointer-events: none;
      }

      .route-path {
        fill: none;
        stroke-width: 8;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 14 10;
        opacity: 0.92;
        filter: drop-shadow(0 4px 4px rgba(61, 38, 14, 0.28));
      }

      .route-path.planA {
        stroke: var(--red);
      }

      .route-path.planB {
        stroke: var(--blue);
      }

      .spot {
        position: absolute;
        z-index: 4;
        width: 36px;
        height: 36px;
        transform: translate(-50%, -50%);
        display: grid;
        place-items: center;
        border: 2px solid rgba(255, 248, 226, 0.95);
        border-radius: 999px 999px 999px 35%;
        color: #ffffff;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.35),
          0 8px 16px rgba(68, 43, 20, 0.32);
        cursor: pointer;
        font-size: 14px;
        font-weight: 900;
        transform-origin: 50% 50%;
      }

      .spot[data-type="ride"] {
        background: var(--red);
      }

      .spot[data-type="show"] {
        background: var(--violet);
      }

      .spot[data-type="food"] {
        background: var(--amber);
      }

      .spot[data-type="photo"] {
        background: var(--green);
      }

      .spot[data-type="service"] {
        background: var(--teal);
      }

      .spot.dim {
        opacity: 0.42;
      }

      .spot.selected {
        outline: 4px solid rgba(246, 210, 124, 0.88);
        transform: translate(-50%, -50%) scale(1.12);
      }

      .spot-popup {
        position: absolute;
        z-index: 6;
        width: min(340px, 46%);
        padding: 14px;
        border: 1px solid rgba(146, 111, 58, 0.55);
        border-radius: 8px;
        background:
          linear-gradient(180deg, rgba(255, 250, 232, 0.97), rgba(242, 226, 190, 0.97));
        box-shadow: 0 22px 50px rgba(68, 43, 20, 0.28);
      }

      .spot-popup::before {
        content: "";
        position: absolute;
        left: 18px;
        bottom: -9px;
        width: 18px;
        height: 18px;
        background: rgba(255, 250, 232, 0.97);
        border-right: 1px solid rgba(146, 111, 58, 0.55);
        border-bottom: 1px solid rgba(146, 111, 58, 0.55);
        transform: rotate(45deg);
      }

      .popup-backdrop {
        position: absolute;
        inset: 0;
        z-index: 5;
        background: rgba(53, 35, 17, 0.22);
        backdrop-filter: blur(1px);
      }

      .spot-popup.modal {
        left: 50% !important;
        top: 50% !important;
        width: min(390px, calc(100% - 32px));
        max-height: min(72vh, 560px);
        overflow: auto;
        transform: translate(-50%, -50%);
      }

      .spot-popup.modal::before {
        display: none;
      }

      .spot-popup h2 {
        margin: 6px 32px 8px 0;
        color: #4b3924;
        font-size: 18px;
        line-height: 1.25;
      }

      .spot-popup .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .popup-close {
        position: absolute;
        top: 8px;
        right: 8px;
        display: grid;
        place-items: center;
        width: 30px;
        height: 30px;
        border: 0;
        border-radius: 999px;
        color: #475569;
        background: #efe2bf;
        cursor: pointer;
        font-size: 18px;
        font-weight: 900;
      }

      .popup-grid {
        display: grid;
        gap: 8px;
      }

      .popup-row {
        display: grid;
        grid-template-columns: 70px 1fr;
        gap: 8px;
        color: #1f2937;
        font-size: 13px;
        line-height: 1.45;
      }

      .popup-row b {
        color: #84663e;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 3px 0;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .side {
        overflow: hidden;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .detail {
        position: relative;
        min-height: 132px;
        padding: 22px 280px 22px 118px;
      }

      .detail::before {
        content: "H";
        position: absolute;
        left: 26px;
        top: 22px;
        display: grid;
        place-items: center;
        width: 68px;
        height: 88px;
        color: #f5e4b5;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.14), transparent),
          #31513f;
        border: 2px solid rgba(146, 111, 58, 0.68);
        border-radius: 8px 8px 22px 22px;
        box-shadow: 0 8px 16px rgba(68, 43, 20, 0.2);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 50px;
        font-weight: 900;
      }

      .detail::after {
        content: "";
        position: absolute;
        right: 22px;
        bottom: 12px;
        width: 240px;
        height: 88px;
        opacity: 0.55;
        background:
          linear-gradient(135deg, transparent 0 38%, rgba(79, 69, 51, 0.55) 39% 42%, transparent 43%),
          linear-gradient(155deg, transparent 0 54%, rgba(79, 69, 51, 0.48) 55% 58%, transparent 59%),
          radial-gradient(ellipse at 72% 72%, rgba(79, 69, 51, 0.18), transparent 42%);
        clip-path: polygon(4% 88%, 18% 60%, 28% 78%, 38% 36%, 50% 68%, 62% 20%, 78% 58%, 88% 18%, 98% 88%);
      }

      .detail h2 {
        margin: 0 0 6px;
        color: #4b3924;
        font-size: 30px;
        line-height: 1.25;
      }

      .detail .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 12px;
      }

      .detail-grid {
        display: grid;
        gap: 10px;
      }

      .route-card {
        display: grid;
        gap: 8px;
      }

      .route-card .tag {
        width: fit-content;
      }

      .route-card h2 {
        margin: 0;
        font-size: 30px;
      }

      .route-card p {
        margin: 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.5;
      }

      .info-row {
        padding: 10px 0;
      }

      .info-row b {
        display: block;
        margin-bottom: 3px;
        color: #334155;
        font-size: 12px;
      }

      .info-row span {
        color: #1f2937;
        font-size: 14px;
        line-height: 1.5;
      }

      .chip-row {
        display: flex;
        justify-content: center;
        gap: 20px;
        overflow-x: auto;
        padding: 16px 18px;
      }

      .chip-row button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        flex: 0 0 auto;
        padding: 4px 0;
        color: var(--muted);
        background: transparent;
        font-size: 15px;
        font-weight: 700;
        border-bottom: 2px solid transparent;
        transition: color 0.2s, border-color 0.2s;
      }

      .chip-row button.active {
        color: var(--ink);
        border-bottom-color: var(--ink);
      }

      .timeline {
        overflow: auto;
        padding: 18px 24px 24px;
      }

      .timeline h3 {
        margin: 0 0 14px;
        color: #594226;
        font-size: 16px;
      }

      .timeline-list {
        display: grid;
        gap: 0;
      }

      .timeline button {
        position: relative;
        overflow: visible;
        width: 100%;
        display: grid;
        grid-template-columns: 126px 54px 1fr;
        gap: 18px;
        align-items: start;
        min-height: 82px;
        padding: 18px 0;
        border-radius: 0;
        color: var(--ink);
        background: transparent;
        border-bottom: 1px solid rgba(146, 111, 58, 0.15);
        text-align: left;
      }

      .timeline button:last-child {
        border-bottom: none;
      }

      .timeline button.active {
        background: rgba(255, 245, 215, 0.35);
      }

      .time {
        color: #53633b;
        font-size: 20px;
        font-weight: 800;
        line-height: 1.18;
      }

      .step-title {
        display: block;
        margin-bottom: 3px;
        color: #4b3924;
        font-size: 21px;
        font-weight: 850;
        line-height: 1.25;
      }

      .step-note {
        display: block;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.45;
      }

      .step-icon {
        display: grid;
        place-items: center;
        width: 42px;
        height: 42px;
        color: #7f623a;
        font-size: 24px;
      }

      .legend {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        width: min(760px, 100%);
        min-width: 520px;
        margin: 10px auto 0;
        padding: 6px 10px;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 99px;
      }

      .dot.ride {
        background: var(--red);
      }

      .dot.show {
        background: var(--violet);
      }

      .dot.food {
        background: var(--amber);
      }

      .dot.photo {
        background: var(--green);
      }

      .dot.service {
        background: var(--teal);
      }

      body {
        position: relative;
        background:
          radial-gradient(circle at 20% 10%, rgba(255, 252, 236, 0.82), transparent 34%),
          radial-gradient(circle at 86% 4%, rgba(223, 191, 128, 0.16), transparent 32%),
          linear-gradient(180deg, rgba(253, 246, 230, 0.96), rgba(244, 230, 199, 0.9)),
          #f1dfb8;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        z-index: 3;
        pointer-events: none;
        background-repeat: no-repeat;
        background-size: contain;
      }

      body::before {
        display: none;
      }

      body::after {
        display: none;
      }

      .app {
        position: relative;
        z-index: 1;
      }

      .app::before {
        display: none;
      }

      .map-shell,
      .side {
        background:
          linear-gradient(90deg, rgba(133, 91, 42, 0.05), transparent 14%, transparent 86%, rgba(133, 91, 42, 0.05)),
          radial-gradient(circle at 12% 18%, rgba(178, 128, 54, 0.12), transparent 20%),
          var(--paper);
        border: 2px solid rgba(146, 111, 58, 0.48);
        outline: 1px solid rgba(255, 250, 232, 0.8);
        box-shadow: var(--shadow);
      }

      .map-shell {
        border-radius: 10px;
      }

      .side {
        border-radius: 10px;
      }

      .map-shell::before,
      .side::before {
        content: "";
        position: absolute;
        z-index: 2;
        pointer-events: none;
        background-repeat: no-repeat;
        background-size: contain;
      }

      .map-shell::before {
        display: none;
      }

      .map-shell::after {
        content: "";
        position: absolute;
        z-index: 4;
        right: 44px;
        top: 112px;
        width: 98px;
        height: 98px;
        opacity: 0.42;
        background: url("assets/magic-ui/refresh/compass.png") center / contain no-repeat;
        pointer-events: none;
      }

      .side::before {
        display: block;
        right: 34px;
        top: 28px;
        width: 94px;
        height: 48px;
        opacity: 0.42;
        background-image:
          url("assets/magic-ui/refresh/bird-1.png"),
          url("assets/magic-ui/refresh/bird-2.png");
        background-position:
          left center,
          right 8px;
        background-size:
          42px auto,
          46px auto;
      }

      .topbar {
        position: relative;
        z-index: 5;
        align-items: flex-start;
        min-height: 104px;
        padding: 14px 22px 0 30px;
        border-bottom: 0;
        background: transparent;
      }

      .title {
        position: relative;
        width: min(390px, 52vw);
        min-height: 104px;
        padding: 28px 58px 24px 62px;
        text-align: center;
        background: url("assets/magic-ui/heraldry/banner-scroll-new.png") center / 100% 100% no-repeat;
        filter: drop-shadow(0 6px 8px rgba(83, 60, 28, 0.12));
      }

      .title h1 {
        font-size: 24px;
        overflow-wrap: anywhere;
      }

      .title p {
        font-size: 0;
        overflow-wrap: anywhere;
      }

      .route-toggle {
        gap: 8px;
        padding: 6px;
        border: 1px solid rgba(146, 111, 58, 0.52);
        border-radius: 999px;
        background: rgba(255, 247, 226, 0.88);
        box-shadow: 0 8px 20px rgba(83, 60, 28, 0.1);
      }

      .map-scroll {
        position: relative;
        max-height: 430px;
        margin-top: -24px;
        padding: 18px 20px 20px;
        background:
          linear-gradient(180deg, rgba(103, 74, 33, 0.035), rgba(103, 74, 33, 0.065)),
          #f1e2c0;
      }

      .map-scroll::before {
        display: none;
      }

      .tag {
        padding: 4px 8px;
        color: #5b4328;
        background: rgba(255, 248, 226, 0.82);
        border: 1px solid rgba(146, 111, 58, 0.32);
        border-radius: 999px;
        letter-spacing: 0;
      }

      .detail {
        min-width: 0;
        padding: 22px 280px 22px 118px;
        border-bottom: 1px solid rgba(146, 111, 58, 0.36);
        background:
          linear-gradient(90deg, rgba(255, 242, 207, 0.48), rgba(255, 250, 240, 0) 68%);
      }

      .detail::before {
        content: "";

      let activeRoute = "planA";
      let activeFilter = "all";
      let selectedId = "birthday";
      let popupOpen = false;
      const mapZoom = {
        scale: 1,
        x: 0,
        y: 0,
        startScale: 1,
        startX: 0,
        startY: 0,
        startDistance: 0,
        startCenter: null,
        panStart: null
      };

      const byId = Object.fromEntries(spots.map((spot) => [spot.id, spot]));
      const parkMap = document.getElementById("parkMap");
      const mapScroll = document.querySelector(".map-scroll");
      const detail = document.getElementById("detail");
      const spotPopup = document.getElementById("spotPopup");
      const popupBackdrop = document.getElementById("popupBackdrop");
      const timeline = document.getElementById("timeline");
      const filters = document.getElementById("filters");
      const routeIntro = document.getElementById("routeIntro");
      const timelineTitle = document.getElementById("timelineTitle");

      function pointForSpot(spot) {
        return `${spot.x * 10.86},${spot.y * 14.48}`;
      }

      function currentRouteSegmentPoints() {
        const order = routes[activeRoute].order;
        const currentIndex = order.indexOf(selectedId);

        if (currentIndex <= 0) return "";

        const previous = byId[order[currentIndex - 1]];
        const current = byId[order[currentIndex]];
        if (!previous || !current) return "";

        return `${pointForSpot(previous)} ${pointForSpot(current)}`;
      }

      function renderMarkers() {
        document.querySelectorAll(".spot").forEach((node) => node.remove());
        const routeSet = new Set(routes[activeRoute].order);

        spots.forEach((spot) => {
          if (activeFilter !== "all" && spot.type !== activeFilter) return;

          const button = document.createElement("button");
          button.className = "spot";
          button.type = "button";
          button.dataset.type = spot.type;
          button.style.left = `${spot.x}%`;
          button.style.top = `${spot.y}%`;
          button.textContent = routeSet.has(spot.id)
            ? routes[activeRoute].order.indexOf(spot.id) + 1
            : "•";
          button.title = spot.name;

          if (!routeSet.has(spot.id)) button.classList.add("dim");
          if (popupOpen && spot.id === selectedId) button.classList.add("selected");

          button.addEventListener("click", () => {
            selectedId = spot.id;
            popupOpen = true;
            render();
          });

          parkMap.appendChild(button);
        });
      }

      function renderDetail() {
        const route = routes[activeRoute];
        detail.innerHTML = `
          <div class="route-card">
            <span class="tag">当前路线</span>
            <h2>${route.title}</h2>
            <p>${route.intro}</p>
          </div>
        `;
      }

      function renderPopup() {
        const spot = byId[selectedId] || spots[0];
        const isInActiveRoute = routes[activeRoute].order.includes(spot.id);
        const routeInfo = isInActiveRoute ? spot[activeRoute] || {} : {};

        spotPopup.innerHTML = `
          <button class="popup-close" type="button" aria-label="关闭详情">×</button>
          <div class="meta">
            <span class="tag">${typeLabels[spot.type]}</span>
            <span class="tag">${spot.area}</span>
            <span class="tag">${spot.priority}</span>
          </div>
          <h2>${spot.name}</h2>
          <div class="popup-grid">
            <div class="popup-row"><b>一句话</b><span>${spot.summary}</span></div>
            <div class="popup-row"><b>时间</b><span>${routeInfo.time || spot.recommended}</span></div>
            <div class="popup-row"><b>路线</b><span>${routeInfo.note || "未纳入当前路线，作为备选点位保留。"}</span></div>
            <div class="popup-row"><b>预算</b><span>${spot.budget}</span></div>
            <div class="popup-row"><b>注意</b><span>${spot.tips}</span></div>
          </div>
        `;
        spotPopup.hidden = !popupOpen;
        popupBackdrop.hidden = !popupOpen;
        spotPopup.querySelector(".popup-close").onclick = closePopup;
      }

      function renderFilters() {
        filters.innerHTML = "";
        Object.entries(typeLabels).forEach(([type, label]) => {
          const button = document.createElement("button");
          button.type = "button";
          button.innerHTML = `${typeIcon(type)}${label}`;
          if (type === activeFilter) button.classList.add("active");
          button.addEventListener("click", () => {
            activeFilter = type;
            render();
          });
          filters.appendChild(button);
        });
      }

      function renderTimeline() {
        const route = routes[activeRoute];
        timelineTitle.textContent = route.title;
        routeIntro.textContent = route.intro;
        timeline.innerHTML = "";

        route.order.forEach((id) => {
          const spot = byId[id];
          if (!spot) return;
          const step = spot[activeRoute] || {};
          const button = document.createElement("button");
          button.type = "button";
          if (spot.id === selectedId) button.classList.add("active");
          button.innerHTML = `
            <span class="time">${step.time || "备选"}</span>
            <span class="step-icon">${typeIcon(spot.type)}</span>
            <span>
              <span class="step-title">${spot.name}</span>
              <span class="step-note">${step.note || spot.summary}</span>
            </span>
          `;
          button.addEventListener("click", () => {
            selectedId = spot.id;
            activeFilter = "all";
            popupOpen = true;
            render();
          });
          timeline.appendChild(button);
        });
      }

      function renderRoutes() {
        const routeSegment = document.getElementById("routeSegment");
        routeSegment.setAttribute("points", currentRouteSegmentPoints());
        routeSegment.classList.toggle("planA", activeRoute === "planA");
        routeSegment.classList.toggle("planB", activeRoute === "planB");
      }

      function renderRouteButtons() {
        document.querySelectorAll(".route-toggle button").forEach((button) => {
          button.classList.toggle("active", button.dataset.route === activeRoute);
          button.onclick = () => {
            activeRoute = button.dataset.route;
            selectedId = routes[activeRoute].order[0];
            popupOpen = false;
            render();
          };
        });
      }

      function render() {
        renderRoutes();
        renderMarkers();
        renderDetail();
        renderPopup();
        renderFilters();
        renderTimeline();
        renderRouteButtons();
      }

      function isMobileMap() {
        return window.matchMedia("(max-width: 980px)").matches;
      }

      function clampMapPan() {
        const viewport = mapScroll.getBoundingClientRect();
        const baseX = parkMap.offsetLeft;
        const baseY = parkMap.offsetTop;
        const availableWidth = viewport.width - baseX * 2;
        const availableHeight = viewport.height - baseY * 2;
        const mapWidth = parkMap.offsetWidth * mapZoom.scale;
        const mapHeight = parkMap.offsetHeight * mapZoom.scale;
        const minX = Math.min(0, availableWidth - mapWidth);
        const minY = Math.min(0, availableHeight - mapHeight);

        mapZoom.x = Math.min(0, Math.max(minX, mapZoom.x));
        mapZoom.y = Math.min(0, Math.max(minY, mapZoom.y));

        if (mapZoom.scale === 1) {
          mapZoom.x = 0;
          mapZoom.y = 0;
        }
      }

      function applyMapTransform() {
        clampMapPan();
        parkMap.style.transform = `translate(${mapZoom.x}px, ${mapZoom.y}px) scale(${mapZoom.scale})`;
      }

      function touchDistance(touches) {
        return Math.hypot(
          touches[0].clientX - touches[1].clientX,
          touches[0].clientY - touches[1].clientY
        );
      }

      function touchCenter(touches) {
        return {
          x: (touches[0].clientX + touches[1].clientX) / 2,
          y: (touches[0].clientY + touches[1].clientY) / 2
        };
      }

      mapScroll.addEventListener("touchstart", (event) => {
        if (!isMobileMap()) return;

        if (event.touches.length === 2) {
          const rect = parkMap.getBoundingClientRect();
          const center = touchCenter(event.touches);

          mapZoom.startScale = mapZoom.scale;
          mapZoom.startX = mapZoom.x;
          mapZoom.startY = mapZoom.y;
          mapZoom.startDistance = touchDistance(event.touches);
          mapZoom.startCenter = {
            screenX: center.x,
            screenY: center.y,
            mapX: (center.x - rect.left) / mapZoom.scale,
            mapY: (center.y - rect.top) / mapZoom.scale
          };
        } else if (event.touches.length === 1 && mapZoom.scale > 1) {
          mapZoom.panStart = {
            screenX: event.touches[0].clientX,
            screenY: event.touches[0].clientY,
            x: mapZoom.x,
            y: mapZoom.y
          };
        }
      }, { passive: true });

      mapScroll.addEventListener("touchmove", (event) => {
        if (!isMobileMap()) return;

        if (event.touches.length === 2 && mapZoom.startCenter) {
          event.preventDefault();
          const center = touchCenter(event.touches);
          const nextScale = mapZoom.startScale * (touchDistance(event.touches) / mapZoom.startDistance);
          mapZoom.scale = Math.min(3, Math.max(1, nextScale));
          const viewport = mapScroll.getBoundingClientRect();
          mapZoom.x = center.x - viewport.left - parkMap.offsetLeft - mapZoom.startCenter.mapX * mapZoom.scale;
          mapZoom.y = center.y - viewport.top - parkMap.offsetTop - mapZoom.startCenter.mapY * mapZoom.scale;
          applyMapTransform();
        } else if (event.touches.length === 1 && mapZoom.panStart && mapZoom.scale > 1) {
          event.preventDefault();
          mapZoom.x = mapZoom.panStart.x + event.touches[0].clientX - mapZoom.panStart.screenX;
          mapZoom.y = mapZoom.panStart.y + event.touches[0].clientY - mapZoom.panStart.screenY;
          applyMapTransform();
        }
      }, { passive: false });

      mapScroll.addEventListener("touchend", () => {
        mapZoom.startCenter = null;
        mapZoom.panStart = null;
      });

      window.addEventListener("resize", () => {
        if (!isMobileMap()) {
          mapZoom.scale = 1;
          mapZoom.x = 0;
          mapZoom.y = 0;
        }
        applyMapTransform();
      });

      function closePopup() {
        popupOpen = false;
        spotPopup.hidden = true;
        popupBackdrop.hidden = true;
        document.querySelectorAll(".spot").forEach((node) => node.classList.remove("selected"));
      }

      popupBackdrop.addEventListener("click", closePopup);

      render();
    </script>
